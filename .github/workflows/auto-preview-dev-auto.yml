name: Dev Auto Branch Build & Artifact

on:
  pull_request:
    branches:
      - 'dev-auto'
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/auto-preview-dev.yml'
  push:
    branches:
      - 'dev-auto'
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/auto-preview-dev.yml'
  workflow_dispatch:
    

jobs:
  build_and_prerelease:
    # Skip preview release for version bumps or explicitly skipped commits
    if: |
      !contains(github.event.head_commit.message, 'chore: bump version') &&
      !contains(github.event.head_commit.message, 'chore(release)') &&
      !contains(github.event.head_commit.message, '[skip dev]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get commit short SHA & Date
        id: vars
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "YY_MM=$(date +'%y.%m')" >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Accept the terms of use to suppress the caching licensing warning
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
          build-scan-publish: false
          # Main branch builds are allowed to update the cache
          cache-read-only: false
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode and set up signing key
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "${SIGNING_STORE_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_STORE_BASE64:-}" ] || [ -z "${SIGNING_KEY_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_ALIAS:-}" ]; then
            exit 0
          fi
          mkdir -p keystore
          echo "${SIGNING_KEY_STORE_BASE64}" | base64 --decode > keystore/carlyu.jks
          echo "storeFile=keystore/carlyu.jks" > keystore.properties
          echo "keyAlias=${SIGNING_KEY_ALIAS}" >> keystore.properties
          echo "keyPassword=${SIGNING_KEY_PASSWORD}" >> keystore.properties
          echo "storePassword=${SIGNING_STORE_PASSWORD}" >> keystore.properties

      - name: Build Dev Release APKs
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.READ_GITHUB_TOKEN }}
        run: ./gradlew assembleOnlineUnstableRelease

      - name: Find and Rename Dev APKs
        id: rename_apks
        run: |
          PROJECT_NAME="InstallerX-Revived"
          # Pure version tag e.g., 26.03.1a2b3c4
          VERSION_TAG="${{ steps.vars.outputs.YY_MM }}.${{ steps.vars.outputs.SHORT_SHA }}"

          ONLINE_APK_DIR="app/build/outputs/apk/onlineUnstable/release/"

          ONLINE_APK_PATH=$(find "$ONLINE_APK_DIR" -maxdepth 1 -type f -name "*.apk" | head -n 1)

          if [ -z "$ONLINE_APK_PATH" ]; then
            echo "ERROR: Could not find both APKs!"
            ls -R app/build/outputs/apk
            exit 1
          fi

          NEW_ONLINE_APK_NAME="${PROJECT_NAME}-online-${VERSION_TAG}.apk"

          NEW_ONLINE_APK_PATH="${ONLINE_APK_DIR}${NEW_ONLINE_APK_NAME}"

          mv "$ONLINE_APK_PATH" "$NEW_ONLINE_APK_PATH"

          echo "online_apk=${NEW_ONLINE_APK_PATH}" >> $GITHUB_OUTPUT
          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Match pure number stable tags, ignoring those with hex hashes
          PREV_TAG=$(git tag --list | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?$' | sort -Vr | head -n 1)
          CURR_TAG="${{ steps.rename_apks.outputs.version_tag }}"

          if [ -z "$PREV_TAG" ]; then
            LOG_RANGE=""
          else
            LOG_RANGE="$PREV_TAG..HEAD"
          fi

          CHANGELOG_LIST=$(git log $LOG_RANGE --pretty=format:"- %s (%an)" | grep -v '^-\s*Merge' | head -n 5)
          CHANGELOG_COUNT=$(git log $LOG_RANGE --pretty=format:"- %s (%an)" | grep -v '^-\s*Merge' | wc -l)
          
          CHANGELOG_BODY_OUTPUT=""
          if [ -z "$CHANGELOG_LIST" ]; then
            CHANGELOG_BODY_OUTPUT="No changes since the last stable release."
          else
            CHANGELOG_BODY_OUTPUT="$CHANGELOG_LIST"
          fi

          CHANGELOG_LINK_OUTPUT=""
          if [ "$CHANGELOG_COUNT" -gt 5 ]; then
            if [ -z "$PREV_TAG" ]; then
              COMPARE_URL="https://github.com/${{ github.repository }}/commits/main"
            else
              COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURR_TAG}"
            fi
            CHANGELOG_LINK_OUTPUT="\n\n**Full Changelog:** [\`${PREV_TAG}...${CURR_TAG}\`]($COMPARE_URL)"
          fi
          
          {
            echo "changelog_body<<EOF"
            echo -e "CHANGELOG:\n$CHANGELOG_BODY_OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "changelog_full_link<<EOF"
            echo -e "$CHANGELOG_LINK_OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "--- Generated Changelog for Release Body ---"
          echo -e "${CHANGELOG_BODY_OUTPUT}${CHANGELOG_LINK_OUTPUT}"

      - name: Upload to Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_CI_SESSION: ${{ secrets.BOT_CI_SESSION }}
        run: |
          pip3 install requests
          python3 .github/tel-bot.py "${{ steps.changelog.outputs.changelog_body }}${{ steps.changelog.outputs.changelog_full_link }}" "${{ steps.rename_apks.outputs.online_apk }}"